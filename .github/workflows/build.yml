name: build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    if: "!contains(github.event.pull_request.labels.*.name, 'docs-only')"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        python: ["3.9", "3.12", "3.14"]

    steps:
      - uses: compas-dev/compas-actions.build@v5
        with:
          invoke_lint: true
          check_import: false
          use_conda: false
          invoke_test: true
          python: ${{ matrix.python }}
          run_prebuild: true
